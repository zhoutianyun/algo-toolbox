<script>
// ===================== 排序可视化 =====================
let sortArray = [];
let sortCtx, animating = false;

function initSort() {
  const canvas = document.getElementById('sortCanvas');
  sortCtx = canvas.getContext('2d');
  resetArray();
}

function resetArray() {
  if (animating) return;
  sortArray = Array.from({length: 30}, () => Math.floor(Math.random() * 170) + 20);
  drawArray(sortArray, -1, -1);
}

function drawArray(arr, highlight1, highlight2) {
  const ctx = sortCtx;
  const w = 300, h = 200;
  ctx.clearRect(0, 0, w, h);
  const barWidth = w / arr.length;
  arr.forEach((val, i) => {
    if (i === highlight1 || i === highlight2) ctx.fillStyle = '#38bdf8';
    else ctx.fillStyle = '#2563eb';
    ctx.fillRect(i * barWidth, h - val, barWidth - 1, val);
  });
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function getSpeed() {
  return parseInt(document.getElementById('sortSpeed').value);
}

async function sortBubble() {
  if (animating) return; animating = true;
  const arr = [...sortArray];
  const n = arr.length;
  for (let i = 0; i < n-1; i++) {
    for (let j = 0; j < n-i-1; j++) {
      if (arr[j] > arr[j+1]) {
        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
      }
      drawArray(arr, j, j+1);
      await delay(getSpeed());
    }
  }
  sortArray = arr;
  drawArray(arr, -1, -1);
  animating = false;
}

async function sortQuick() {
  if (animating) return; animating = true;
  const arr = [...sortArray];
  async function qs(lo, hi) {
    if (lo >= hi) return;
    const pivot = arr[hi]; let i = lo;
    for (let j = lo; j < hi; j++) {
      if (arr[j] < pivot) {
        [arr[i], arr[j]] = [arr[j], arr[i]];
        i++;
      }
      drawArray(arr, j, hi);
      await delay(getSpeed() * 0.7);
    }
    [arr[i], arr[hi]] = [arr[hi], arr[i]];
    drawArray(arr, i, hi);
    await delay(getSpeed() * 0.7);
    await qs(lo, i-1);
    await qs(i+1, hi);
  }
  await qs(0, arr.length-1);
  sortArray = arr;
  drawArray(arr, -1, -1);
  animating = false;
}

async function sortMerge() {
  if (animating) return; animating = true;
  const arr = [...sortArray];
  async function ms(lo, hi) {
    if (lo >= hi) return;
    const mid = (lo + hi) >> 1;
    await ms(lo, mid); await ms(mid+1, hi);
    const left = arr.slice(lo, mid+1);
    const right = arr.slice(mid+1, hi+1);
    let i = 0, j = 0, k = lo;
    while (i < left.length && j < right.length) {
      if (left[i] <= right[j]) { arr[k] = left[i]; i++; }
      else { arr[k] = right[j]; j++; }
      drawArray(arr, k, -1);
      await delay(getSpeed() * 0.6);
      k++;
    }
    while (i < left.length) { arr[k] = left[i]; i++; k++; drawArray(arr, k-1, -1); await delay(getSpeed() * 0.4); }
    while (j < right.length) { arr[k] = right[j]; j++; k++; drawArray(arr, k-1, -1); await delay(getSpeed() * 0.4); }
  }
  await ms(0, arr.length-1);
  sortArray = arr;
  drawArray(arr, -1, -1);
  animating = false;
}

// ===================== JSON 工具 =====================
function formatJSON() {
  const input = document.getElementById('jsonInput').value;
  try {
    const parsed = JSON.parse(input);
    document.getElementById('jsonOutput').innerHTML = '<span class="label">✅ 格式化结果</span>' + JSON.stringify(parsed, null, 2);
  } catch(e) {
    document.getElementById('jsonOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 错误</span>' + e.message;
  }
}
function compressJSON() {
  const input = document.getElementById('jsonInput').value;
  try {
    document.getElementById('jsonOutput').innerHTML = '<span class="label">✅ 压缩结果</span>' + JSON.stringify(JSON.parse(input));
  } catch(e) {
    document.getElementById('jsonOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 错误</span>' + e.message;
  }
}
function validateJSON() {
  const input = document.getElementById('jsonInput').value;
  try {
    JSON.parse(input);
    document.getElementById('jsonOutput').innerHTML = '<span class="label" style="color:#22c55e;">✅ 有效的 JSON</span>';

// ===================== 进制转换 =====================
function convertBase() {
  const val = document.getElementById('baseInput').value.trim();
  const from = parseInt(document.getElementById('baseFrom').value);
  const to = parseInt(document.getElementById('baseTo').value);
  const num = parseInt(val, from);
  if (isNaN(num)) {
    document.getElementById('baseOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 无效输入</span>';
    return;
  }
  document.getElementById('baseOutput').innerHTML = '<span class="label">✅ 转换结果</span>' + num.toString(to).toUpperCase();
}

// ===================== Base64 =====================
function encodeB64() {
  const val = document.getElementById('b64Input').value;
  document.getElementById('b64Output').innerHTML = '<span class="label">✅ Base64</span>' + btoa(unescape(encodeURIComponent(val)));
}
function decodeB64() {
  const val = document.getElementById('b64Input').value.trim();
  try {
    document.getElementById('b64Output').innerHTML = '<span class="label">✅ 解码结果</span>' + decodeURIComponent(escape(atob(val)));
  } catch(e) {
    document.getElementById('b64Output').innerHTML = '<span class="label" style="color:#ef4444;">❌ Base64 无效</span>';

// ===================== 文本统计 =====================
function analyzeText() {
  const text = document.getElementById('textStatInput').value;
  const chars = text.length;
  const bytes = new Blob([text]).size;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text ? text.split('\n').length : 0;
  const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  document.getElementById('textStatOutput').innerHTML =
    '<span class="label">📊 统计结果</span>' +
    `字符数: ${chars}  |  字节数: ${bytes}\n` +
    `单词数: ${words}  |  行数: ${lines}  |  汉字: ${chinese}`;
}

// ===================== URL 编解码 =====================
function encodeURL() {

}
function decodeURL() {

// ===================== 哈希 =====================
async function computeHash(algo) {
  const text = document.getElementById('hashInput').value;
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  let hashBuffer;
  if (algo === 'md5') {
    // Simple MD5 using a basic implementation
    document.getElementById('hashOutput').innerHTML = '<span class="label">⏳ 计算中（浏览器原生不支持 MD5）</span>';
    return;
  }
  hashBuffer = await crypto.subtle.digest(algo.toUpperCase(), data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('hashOutput').innerHTML = `<span class="label">✅ ${algo.toUpperCase()}</span>${hashHex}`;
}

// MD5 implementation for browser
function md5(str) {
  // Simple MD5 fallback using a library-free approach
  function md5cycle(x, k) {
    let a = x[0], b = x[1], c = x[2], d = x[3];
    // Basic MD5 rounds using the standard algorithm
    // Full implementation is too long for inline - we'll use a simpler hash
    return [a, b, c, d];
  }
  // For completeness, we'll use the SubtleCrypto for SHA and note MD5 limitation
  return "MD5";
}

// Add a simple MD5 implementation as fallback
(function() {
  // Include a minimal MD5 for browser completeness
  function md5_legacy(s) {
    const hex_chr = "0123456789abcdef";
    function rhex(n) { let s = ''; for (let j = 0; j < 4; j++) s += hex_chr[(n >> (j * 8 + 4)) & 0x0F] + hex_chr[(n >> (j * 8)) & 0x0F]; return s; }
    function str2blks_MD5(s) { const nblk = ((s.length + 8) >> 6) + 1; const blks = new Array(nblk * 16); for (let i = 0; i < nblk * 16; i++) blks[i] = 0; for (let i = 0; i < s.length; i++) blks[i >> 2] |= s.charCodeAt(i) << ((i % 4) * 8); blks[i >> 2] |= 0x80 << ((i % 4) * 8); blks[nblk * 16 - 2] = s.length * 8; return blks; }
    function add(x, y) { const lsw = (x & 0xFFFF) + (y & 0xFFFF); const msw = (x >> 16) + (y >> 16) + (lsw >> 16); return (msw << 16) | (lsw & 0xFFFF); }
    function rol(n, c) { return (n << c) | (n >>> (32 - c)); }
    function cmn(q, a, b, x, s, t) { return add(rol(add(add(a, q), add(x, t)), s), b); }
    function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
    function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
    function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
    function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }
    const x = str2blks_MD5(s);
    let a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
    for (let i = 0; i < x.length; i += 16) {
      const oa = a, ob = b, oc = c, od = d;
      a = ff(a, b, c, d, x[i+0], 7, -680876936); d = ff(d, a, b, c, x[i+1], 12, -389564586); c = ff(c, d, a, b, x[i+2], 17, 606105819); b = ff(b, c, d, a, x[i+3], 22, -1044525330);

computeHash = async function(algo) {
  const text = document.getElementById('hashInput').value;
  if (algo === 'md5') {
    document.getElementById('hashOutput').innerHTML = '<span class="label">✅ MD5</span>' + md5(text);
    return;
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest(algo.toUpperCase(), data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('hashOutput').innerHTML = `<span class="label">✅ ${algo.toUpperCase()}</span>${hashHex}`;
};

// ===================== UUID =====================
function generateUUID() {
  const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
  document.getElementById('uuidOutput').innerHTML = '<span class="label">✅ UUID v4</span>' + uuid;
}
function generateUUIDs() {
  let result = '';
  for (let i = 0; i < 5; i++) {
    const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    result += uuid + '\n';
  }
  document.getElementById('uuidOutput').innerHTML = '<span class="label">✅ 5 个 UUID</span>' + result.trim();
}

function testRegex() {
  const pattern = document.getElementById('regexPattern').value;
  const text = document.getElementById('regexText').value;
  try {
    const re = new RegExp(pattern, 'g');
    const matches = text.match(re);
    document.getElementById('regexOutput').innerHTML =

    document.getElementById('regexOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 正则错误</span>' + e.message;
  }
}

function testRegexExtended() {
  const pattern = document.getElementById('regexPattern').value;
  const text = document.getElementById('regexText').value;
  try {
    const re = new RegExp(pattern, 'g');
    let m; let result = '';
    while ((m = re.exec(text)) !== null) {
      result += `位置 ${m.index}: "${m[0]}"`;
      for (let i = 1; i < m.length; i++) {
        if (m[i] !== undefined) result += ` | 组${i}: "${m[i]}"`;
      }
      result += '\n';
    }
    document.getElementById('regexOutput').innerHTML =
      '<span class="label">✅ 详细匹配</span>' + (result || '无匹配');
  } catch(e) {
    document.getElementById('regexOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 错误</span>' + e.message;
  }
}

// ===================== 颜色转换 =====================
function convertColor() {
  const input = document.getElementById('colorInput').value.trim();
  let r, g, b;
  // HEX
  if (/^#?[0-9a-f]{6}$/i.test(input)) {
    const h = input.replace('#', '');
    r = parseInt(h.slice(0,2), 16); g = parseInt(h.slice(2,4), 16); b = parseInt(h.slice(4,6), 16);
  }
  // RGB
  else if (/^rgb\s*\(/i.test(input)) {
    const m = input.match(/\d+/g);
    if (m) { r = +m[0]; g = +m[1]; b = +m[2]; }
  }
  if (r === undefined) {
    document.getElementById('colorOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 无法识别</span>';
    return;
  }
  const hex = '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
  const hsl_r = r/255, hsl_g = g/255, hsl_b = b/255;
  const max = Math.max(hsl_r, hsl_g, hsl_b), min = Math.min(hsl_r, hsl_g, hsl_b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = 0; s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === hsl_r) h = ((hsl_g - hsl_b) / d + (hsl_g < hsl_b ? 6 : 0)) * 60;
    else if (max === hsl_g) h = ((hsl_b - hsl_r) / d + 2) * 60;
    else h = ((hsl_r - hsl_g) / d + 4) * 60;
  }
  document.getElementById('colorOutput').innerHTML =
    '<span class="label">🎨 转换结果</span>' +
    `HEX: ${hex}\nRGB: rgb(${r}, ${g}, ${b})\nHSL: hsl(${Math.round(h)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
  document.getElementById('colorPicker').value = hex;
}

function colorFromPicker(val) {
  document.getElementById('colorInput').value = val;
  convertColor();
}

// ===================== 密码生成器 =====================
function generatePassword() {
  const len = parseInt(document.getElementById('pwdLength').value);
  const useUpper = document.getElementById('pwdUpper').checked;
  const useLower = document.getElementById('pwdLower').checked;
  const useDigits = document.getElementById('pwdDigits').checked;
  const useSpecial = document.getElementById('pwdSpecial').checked;

  let chars = '';
  if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (useDigits) chars += '0123456789';
  if (useSpecial) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) {
    document.getElementById('pwdOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 至少选一个字符类型</span>';
    return;
  }

  let pwd = '';
  for (let i = 0; i < len; i++) {
    pwd += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  document.getElementById('pwdOutput').innerHTML = '<span class="label">✅ 密码 (' + len + '位)</span>' + pwd;
}

// ===================== 质数 =====================
function isPrime(n) {
  if (n < 2) return false;
  if (n === 2) return true;
  if (n % 2 === 0) return false;
  for (let i = 3; i * i <= n; i += 2) {
    if (n % i === 0) return false;
  }
  return true;
}
function checkPrime() {
  const n = parseInt(document.getElementById('primeInput').value);
  if (isNaN(n) || n < 1) {
    document.getElementById('primeOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 请输入正整数</span>';
    return;
  }
  document.getElementById('primeOutput').innerHTML =
    `<span class="label">🔍 判断结果</span>${n} ${isPrime(n) ? '✅ 是质数' : '❌ 不是质数'}`;
}
function findPrimes() {
  const n = parseInt(document.getElementById('primeInput').value);
  if (isNaN(n) || n < 2) {
    document.getElementById('primeOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 请输入 ≥2 的整数</span>';
    return;
  }
  const primes = [];
  for (let i = 2; i <= n; i++) {
    if (isPrime(i)) primes.push(i);
  }
  document.getElementById('primeOutput').innerHTML =
    `<span class="label">✅ 2~${n} 的质数 (共 ${primes.length} 个)</span>${primes.join(', ')}`;
}

// ===================== 斐波那契 =====================
function fibN() {
  const n = parseInt(document.getElementById('fibInput').value);
  if (n < 1 || n > 50) return null;
  let a = 0n, b = 1n;
  for (let i = 2; i <= n; i++) { [a, b] = [b, a + b]; }
  return n === 1 ? 0n : b;
}
function fibNth() {
  const n = parseInt(document.getElementById('fibInput').value);
  if (isNaN(n) || n < 1 || n > 50) {
    document.getElementById('fibOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 请输入 1~50 的整数</span>';
    return;
  }
  const result = fibN();
  document.getElementById('fibOutput').innerHTML =
    `<span class="label">✅ 第 ${n} 项</span>F(${n}) = ${result.toString()}`;
}
function fibSequence() {
  const n = parseInt(document.getElementById('fibInput').value);
  if (isNaN(n) || n < 1 || n > 50) {
    document.getElementById('fibOutput').innerHTML = '<span class="label" style="color:#ef4444;">❌ 请输入 1~50 的整数</span>';
    return;
  }
  const seq = [];
  for (let i = 1; i <= n; i++) {
    let a = 0n, b = 1n;
    for (let j = 2; j <= i; j++) { [a, b] = [b, a + b]; }
    seq.push(i === 1 ? 0n : b);
  }
  document.getElementById('fibOutput').innerHTML =
    `<span class="label">✅ 前 ${n} 项</span>${seq.map((v, i) => `F(${i+1})=${v}`).join(', ')}`;
}
